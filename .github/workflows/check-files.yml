name: Check Q1 Submission

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check_q1_file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
       
      - name: Check if submission/q1.txt exists
        run: |
          if [ ! -f "submission/q1.txt" ]; then
            echo "Error: submission/q1.txt does not exist"
            exit 1
          else
            echo "submission/q1.txt exists."
          fi
          
      - name: Check if submission/q1.txt is a text file
        run: |
          if file "submission/q1.txt" | grep -q "text"; then
            echo "submission/q1.txt is a text file."
          else
            echo "Error: submission/q1.txt is not a text file"
            exit 1
          fi 

